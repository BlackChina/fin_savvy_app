services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: fin_savvy
      POSTGRES_USER: fin_savvy_user
      POSTGRES_PASSWORD: fin_savvy_password
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fin_savvy_user -d fin_savvy"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://fin_savvy_user:fin_savvy_password@db:5432/fin_savvy
      FINSAVVY_CLASSIFIER: local
      # Below this top-class probability, ML category/party is skipped (raw description as party fallback).
      # "0" forces every prediction through and often collapses spend to one party (e.g. Bossa); 0.28–0.45 is typical.
      FINSAVVY_ML_MIN_PROBABILITY: "0.32"
      # Dashboard: collapse duplicate rows from overlapping statement uploads (same date, amount, description)
      FINSAVVY_DASHBOARD_DEDUPE: "1"
    ports:
      - "8001:8000"
    volumes:
      - ./fin_savvy_app:/app/fin_savvy_app
    command: uvicorn fin_savvy_app.main:app --host 0.0.0.0 --port 8000

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

  ejournal:
    build: .
    restart: unless-stopped
    ports:
      - "8002:8000"
    volumes:
      - ./ejournal_app:/app/ejournal_app
    command: uvicorn ejournal_app.main:app --host 0.0.0.0 --port 8000

volumes:
  db_data:
  portainer_data:
