<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinSavvy Background</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100%;
    min-height: 100vh;
    font-family: "Segoe UI", sans-serif;
    background: #f0f4f8;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .bg-poster {
    position: relative;
    width: 450px;
    height: 900px;
    overflow: hidden;
    background: linear-gradient(160deg, #ffffff 0%, #e8eef5 40%, #dce7f3 100%);
  }
  .calc-overlay {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 68% 55%, rgba(180,200,220,0.35) 0%, transparent 55%),
      radial-gradient(circle at 30% 80%, rgba(160,185,210,0.2) 0%, transparent 40%);
    pointer-events: none;
  }
  .calc-keys {
    position: absolute;
    top: 160px;
    right: -30px;
    width: 320px;
    height: 600px;
    opacity: 0.13;
    transform: rotate(-12deg);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    padding: 20px;
  }
  .key {
    border-radius: 50%;
    background: #9ab3cc;
    aspect-ratio: 1;
  }
  .key.wide {
    grid-column: span 2;
    border-radius: 30px;
  }
  .top-section {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 210px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: 20px;
    z-index: 10;
  }
  .bottom-section {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 190px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    z-index: 10;
    padding-bottom: 20px;
  }
  .brought-by {
    font-size: 14px;
    color: #7a95b0;
    letter-spacing: 0.3px;
    margin-bottom: 4px;
  }
  .signin-demo {
    position: absolute;
    top: 220px;
    left: 36px;
    right: 36px;
    bottom: 200px;
    border: 2.5px dashed rgba(100,150,200,0.3);
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: rgba(100,150,200,0.5);
    font-size: 13px;
    letter-spacing: 0.5px;
    gap: 6px;
    pointer-events: none;
    z-index: 5;
  }
</style>
</head>
