{# Poster images are regenerated from static/finsavvy_background.html on app startup. #}
{% macro finsavvy_auth_poster() -%}
<div class="finsavvy-bg-viewport">
  <div class="bg-poster">
    <div class="calc-overlay"></div>
    <div class="calc-keys" aria-hidden="true">
      <div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div>
      <div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div>
      <div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div>
      <div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div>
      <div class="key wide"></div><div class="key"></div><div class="key"></div>
      <div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div>
      <div class="key"></div><div class="key"></div><div class="key"></div><div class="key"></div>
    </div>

    <div class="top-section">
      <img class="top-brand-img" src="/static/finsavvy_top_brand.png?v={{ finsavvy_poster_v }}" alt="FinSavvy" />
    </div>

    <div class="signin-slot">
      {{ caller() }}
    </div>

    <div class="bottom-section">
      <img class="bottom-brand-img" src="/static/finsavvy_bottom_brand.png?v={{ finsavvy_poster_v }}" alt="Brought to you by FooBar IT Solutions" />
    </div>
  </div>
</div>
{%- endmacro %}
