<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Fin Savvy – Reset password</title>
    <link rel="stylesheet" href="/static/finsavvy_background.css" />
  </head>
  <body class="finsavvy-auth-page">
    {% from "macros/finsavvy_poster.html" import finsavvy_auth_poster %}
    {% call finsavvy_auth_poster() %}
    <div class="auth-card">
      <h1>Reset password</h1>
      <p>Enter your new password below.</p>

      <form method="post" action="/reset-password">
        <input type="hidden" name="token" value="{{ token }}" />
        <div class="field">
          <label for="password">New password</label>
          <input id="password" name="password" type="password" autocomplete="new-password" required minlength="6" />
        </div>
        <button type="submit">Reset password</button>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
      </form>

      <div class="links">
        <a href="/login">Back to sign in</a>
      </div>
    </div>
    {% endcall %}
  </body>
</html>
