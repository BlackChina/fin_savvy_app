<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Fin Savvy – Login</title>
    <link rel="stylesheet" href="/static/finsavvy_background.css" />
  </head>
  <body class="finsavvy-auth-page">
    {% from "macros/finsavvy_poster.html" import finsavvy_auth_poster %}
    {% call finsavvy_auth_poster() %}
    <div class="auth-card">
      <h1>Sign in</h1>
      <p>Sign in to view your dashboard.</p>

      <form method="post" action="/login">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>

        <button type="submit">Sign in</button>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
      </form>

      <div class="links">
        <a href="/register">Create account</a>
        <span style="color: #64748b;"> &bull; </span>
        <a href="/forgot-password">Forgot password?</a>
      </div>
    </div>
    {% endcall %}
  </body>
</html>
