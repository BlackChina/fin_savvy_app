<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Fin Savvy – Login</title>
    <style>
      html {
        height: 100%;
      }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 0;
        color: #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100%;
        min-height: 100dvh;
        background-color: #020617;
        position: relative;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -2;
        background: url("/static/FinSavvy%20financial%20design%20background.png") center top /
          cover no-repeat;
        filter: blur(42px) brightness(0.72) saturate(1.2);
        transform: scale(1.12);
        opacity: 0.48;
        pointer-events: none;
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        background-image: linear-gradient(
            rgba(2, 6, 23, 0.58),
            rgba(2, 6, 23, 0.88)
          ),
          url("/static/FinSavvy%20financial%20design%20background.png");
        background-position: center, center top;
        background-repeat: no-repeat, no-repeat;
        background-size: 100% 100%, cover;
        background-attachment: fixed, fixed;
      }
      .card {
        background: #020617;
        border-radius: 1rem;
        padding: 2rem 2.25rem 2.5rem;
        border: 1px solid #1f2937;
        width: 100%;
        max-width: 380px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.75);
      }
      h1 {
        margin: 0 0 0.3rem;
        font-size: 1.5rem;
      }
      p {
        margin: 0 0 1.5rem;
        font-size: 0.9rem;
        color: #9ca3af;
      }
      label {
        display: block;
        font-size: 0.8rem;
        margin-bottom: 0.25rem;
        color: #9ca3af;
      }
      input {
        width: 100%;
        padding: 0.55rem 0.7rem;
        border-radius: 0.5rem;
        border: 1px solid #374151;
        background: #020617;
        color: #e5e7eb;
        font-size: 0.9rem;
        box-sizing: border-box;
      }
      input:focus {
        outline: none;
        border-color: #38bdf8;
        box-shadow: 0 0 0 1px #0ea5e9;
      }
      .field {
        margin-bottom: 1rem;
      }
      button {
        width: 100%;
        padding: 0.6rem 0.7rem;
        border-radius: 0.6rem;
        border: none;
        background: linear-gradient(135deg, #22c55e, #0ea5e9);
        color: #0b1120;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        margin-top: 0.5rem;
      }
      button:hover {
        filter: brightness(1.05);
      }
      .hint {
        margin-top: 1.25rem;
        font-size: 0.8rem;
        color: #6b7280;
      }
      .error {
        margin-top: 0.5rem;
        font-size: 0.8rem;
        color: #f97316;
      }
      .small-pill {
        display: inline-flex;
        padding: 0.1rem 0.45rem;
        border-radius: 999px;
        border: 1px solid #374151;
        font-size: 0.7rem;
        color: #9ca3af;
        margin-top: 0.4rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Fin Savvy</h1>
      <p>Sign in to view your dashboard.</p>

      <form method="post" action="/login">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>

        <button type="submit">Sign in</button>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
      </form>

      <div class="links" style="margin-top: 1.25rem; font-size: 0.9rem;">
        <a href="/register" style="color: #38bdf8; text-decoration: none;">Create account</a>
        <span style="color: #374151;"> &bull; </span>
        <a href="/forgot-password" style="color: #38bdf8; text-decoration: none;">Forgot password?</a>
      </div>
    </div>
  </body>
</html>
