<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Fin Savvy – Change password</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; background: #0f172a; color: #e5e7eb; min-height: 100vh; }
      body::before { content: ""; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: -1; }
      header { padding: 1.2rem 2rem; background: #020617; border-bottom: 1px solid #1f2937; display: flex; justify-content: space-between; align-items: center; }
      nav { margin: 1rem 2rem; }
      nav a { color: #9ca3af; text-decoration: none; }
      main { padding: 2rem; max-width: 420px; }
      .card { background: #020617; border-radius: 0.75rem; padding: 1.5rem 2rem; border: 1px solid #1f2937; }
      label { display: block; font-size: 0.85rem; color: #9ca3af; margin-bottom: 0.35rem; }
      input { width: 100%; padding: 0.5rem; border-radius: 0.5rem; border: 1px solid #374151; background: #020617; color: #e5e7eb; box-sizing: border-box; margin-bottom: 1rem; }
      button { padding: 0.55rem 1rem; border-radius: 0.5rem; border: none; background: linear-gradient(135deg, #22c55e, #0ea5e9); color: #0b1120; font-weight: 600; cursor: pointer; }
      .error { color: #f97316; margin-top: 0.5rem; }
      .logout-button { background: transparent; border: 1px solid #374151; color: #9ca3af; padding: 0.25rem 0.7rem; border-radius: 999px; cursor: pointer; font-size: 0.75rem; }
    </style>
  </head>
  <body>
    <header>
      <h1 style="margin:0;font-size:1.4rem;">Fin Savvy</h1>
      <div style="display:flex;align-items:center;gap:0.75rem;">
        <span style="font-size:0.85rem;">{{ username }}</span>
        <form method="post" action="/logout" style="margin:0;"><button type="submit" class="logout-button">Log out</button></form>
      </div>
    </header>
    <nav><a href="/settings" style="color:#38bdf8;">← Settings</a></nav>
    <main>
      <div class="card">
        <h2 style="margin-top:0;">Change password</h2>
        <form method="post" action="/account/password">
          <label for="current_password">Current password</label>
          <input type="password" name="current_password" id="current_password" required autocomplete="current-password" />
          <label for="new_password">New password</label>
          <input type="password" name="new_password" id="new_password" required minlength="6" autocomplete="new-password" />
          <button type="submit">Update</button>
          {% if error %}<p class="error">{{ error }}</p>{% endif %}
        </form>
      </div>
    </main>
  </body>
</html>
