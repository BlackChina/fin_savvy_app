<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Fin Savvy – Create account</title>
    <link rel="stylesheet" href="/static/finsavvy_background.css" />
  </head>
  <body class="finsavvy-auth-page">
    {% from "macros/finsavvy_poster.html" import finsavvy_auth_poster %}
    {% call finsavvy_auth_poster() %}
    <div class="auth-card">
      <h1>Create account</h1>
      <p>Register to start using Fin Savvy.</p>

      <form method="post" action="/register">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="new-password" required minlength="6" />
        </div>

        <button type="submit">Create account</button>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
      </form>

      <div class="links">
        <a href="/login">Already have an account? Sign in</a>
      </div>
    </div>
    {% endcall %}
  </body>
</html>
